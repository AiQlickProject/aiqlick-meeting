name: Expo CI

on:
  pull_request:
  push:
    branches: [main, dev]

concurrency:
  group: expo-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate web app
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build web export
        run: npm run build:web

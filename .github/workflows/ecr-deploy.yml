name: Build and Deploy to ECR

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: eu-north-1
  ECR_REPOSITORY: aiqlick-meeting
  EC2_INSTANCE_ID: i-0620d2e23695f5bfc
  AWS_ROLE_ARN: arn:aws:iam::842697652860:role/github-actions-role

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "registry=${{ steps.login-ecr.outputs.registry }}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image to ECR
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.sha }}
          build-args: |
            JITSI_WEB_TAG=stable-9823
            BUILD_VERSION=${{ steps.meta.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to EC2 via SSM
        run: |
          set -euo pipefail

          echo "Deploying aiqlick-meeting to EC2..."
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ env.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=["cd /opt/jitsi/jitsi-deploy && aws ecr get-login-password --region eu-north-1 | docker login --username AWS --password-stdin ${{ steps.login-ecr.outputs.registry }} && docker compose pull web && docker compose up -d --force-recreate web"]' \
            --region ${{ env.AWS_REGION }} \
            --output text \
            --query 'Command.CommandId')

          echo "Command ID: $COMMAND_ID"
          echo "Waiting for deployment to complete..."

          # Don't swallow the wait failure with `|| true` — we want to know.
          # Capture exit code, then ALWAYS print the full result (status,
          # stdout AND stderr) so the actual EC2 error lands in the workflow
          # log even if the wait timed out or the command failed.
          WAIT_EXIT=0
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ env.EC2_INSTANCE_ID }}" \
            --region ${{ env.AWS_REGION }} || WAIT_EXIT=$?

          echo "::group::SSM command result"
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ env.EC2_INSTANCE_ID }}" \
            --region ${{ env.AWS_REGION }} \
            --query '{Status:Status,ResponseCode:ResponseCode,Stdout:StandardOutputContent,Stderr:StandardErrorContent}' \
            --output json
          echo "::endgroup::"

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ env.EC2_INSTANCE_ID }}" \
            --region ${{ env.AWS_REGION }} \
            --query 'Status' \
            --output text)

          if [ "$WAIT_EXIT" -ne 0 ] || [ "$STATUS" != "Success" ]; then
            echo "::error::SSM deploy command did not succeed (Status=$STATUS, WaitExit=$WAIT_EXIT)"
            exit 1
          fi

          echo "SSM deploy command completed successfully."

      - name: Deployment summary
        run: |
          echo "AIQLick Meeting deployment completed!"
          echo "Commit: ${{ steps.meta.outputs.sha }}"
          echo "Image: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.sha }}"
          echo "EC2: ${{ env.EC2_INSTANCE_ID }}"
